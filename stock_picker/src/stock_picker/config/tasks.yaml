find_trending_companies:
  description: >
    Find the top trending companies in the {sector} by researching the latest news.
    Find new companies that you have not found before.
  expected_output: >
    A list of trending companies in the {sector}.
  agent: trending_company_finder
  output_file: output/trending_companies.json

research_trending_companies:
  description: >
    Given a list of trending companies, provide detailed analysis of each company in a report by searching online.
  expected_output: >
    The chosen company and why it was chosen; the companies that were not selected and why they are not selected.
  agent: financial_researcher
  context:
    - find_trending_companies
  output_file: output/research_report.json

pick_best_stock:
  description: >
    Given the research report of trending companies, pick the best stock for investment.
    Send a push notification to the user with the decision and 1 sentence rationale.
  expected_output: >
    The best stock for investment among the trending companies.
  agent: stock_picker
  context:
    - research_trending_companies
  output_file: output/best_stock.md
  
  
